<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snoozeds</title>
  <!-- Include Tailwind CSS -->
  <link href="output.css" rel="stylesheet" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
</head>
<body class="dark:bg-gray-900 bg-gray-100">
  <div class="flex justify-center items-center min-h-screen">
    <div class="w-full md:w-3/4 lg:w-1/2 xl:w-1/3">
      <!-- Title -->
      <div class="flex flex-col items-center md:flex-row">
        <!-- Image -->
        <img
          src="assets/profile.png"
          alt="logo"
          class="lg:w-80 lg:h-80 md:w-64 md:h-64 w-48 h-48 rounded md:mr-4 mb-4 md:mb-0"
        />

        <!-- Text -->
        <div class="flex flex-col items-start">
          <h1 class="text-4xl font-bold text-gray-800 dark:text-white">
            Hi, I'm Snoozeds. 👋
          </h1>
          <p class="text-lg font-bold text-gray-800 dark:text-white max-w-md mb-5">
            I'm an autodidactic developer from England, UK. I have
            experience with: <br />
            <br />
            HTML, CSS, JavaScript and Node (Backend).<br />
            <br />
            I currently work on
            <a
              href="https://dankrpg.xyz"
              target="_blank"
              class="text-blue-500 hover:text-blue-700 hover:underline"
            >DankRPG</a
            >, an open-source Discord economy and RPG bot.
          </p>
              <!-- Socials -->
              <div class="flex items-center sm:justify-center md:justify-start">
                <a
                  href="https://www.youtube.com/channel/UCIL7el6oqypKDaZZSjVmP_g"
                  target="_blank"
                  class="mr-4 hover:scale-110 transition duration-700 ease-in-out"
                >
                  <i class="fab fa-youtube text-4xl" style="color: red"></i>
                </a>
                <a
                  href="https://discord.com/users/764564962815115267"
                  target="_blank"
                  class="mr-4 hover:scale-110 transition duration-500 ease-in-out"
                >
                  <i class="fab fa-discord text-4xl text-blue-500"></i>
                </a>
                <a
                  href="https://twitter.com/Snoozeds"
                  target="_blank"
                  class="mr-4 hover:scale-110 transition duration-500 ease-in-out"
                >
                  <i class="fab fa-twitter text-4xl text-blue-700"></i>
                </a>
                <a
                  href="https://steamcommunity.com/id/Snoozeds/"
                  target="_blank"
                  class="mr-4 hover:scale-110 transition duration-500 ease-in-out"
                >
                  <i class="fab fa-steam text-4xl text-black dark:text-white"></i>
                </a>
                <a
                  href="https://github.com/Snoozeds"
                  target="_blank"
                  class="mr-4 hover:scale-110 transition duration-500 ease-in-out"
                >
                  <i class="fab fa-github text-4xl text-black dark:text-white"></i>
                </a>
                <a
                  href="https://open.spotify.com/user/31xcuolxkgqnvs6dqp2wiwwserle"
                  target="_blank"
                  class="mr-4 hover:scale-110 transition duration-500 ease-in-out"
                >
                  <i class="fab fa-spotify text-4xl" style="color: green"></i>
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
